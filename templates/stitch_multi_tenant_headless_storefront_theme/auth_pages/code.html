<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - LUXE</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#e5e2e1",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f7f3f2",
                        "inverse-surface": "#313030",
                        "on-primary-container": "#858383",
                        "on-tertiary-fixed": "#1c1b1a",
                        "secondary": "#585f6c",
                        "on-surface-variant": "#444748",
                        "on-tertiary-container": "#868382",
                        "surface-variant": "#e5e2e1",
                        "surface-dim": "#ddd9d8",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed-dim": "#c8c6c5",
                        "on-secondary-fixed-variant": "#404754",
                        "on-surface": "#1c1b1b",
                        "surface-bright": "#fdf8f8",
                        "surface-container-high": "#ebe7e6",
                        "secondary-container": "#dce2f3",
                        "on-error": "#ffffff",
                        "primary": "#000000",
                        "surface-tint": "#5f5e5e",
                        "tertiary": "#000000",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#c0c7d6",
                        "tertiary-fixed": "#e6e2df",
                        "tertiary-fixed-dim": "#cac6c4",
                        "primary-container": "#1c1b1b",
                        "surface": "#fdf8f8",
                        "tertiary-container": "#1c1b1a",
                        "on-secondary": "#ffffff",
                        "surface-container-highest": "#e5e2e1",
                        "on-primary-fixed": "#1c1b1b",
                        "on-primary-fixed-variant": "#474746",
                        "on-tertiary-fixed-variant": "#484645",
                        "on-secondary-fixed": "#151c27",
                        "on-secondary-container": "#5e6572",
                        "secondary-fixed": "#dce2f3",
                        "inverse-on-surface": "#f4f0ef",
                        "inverse-primary": "#c8c6c5",
                        "on-tertiary": "#ffffff",
                        "background": "#fdf8f8",
                        "on-background": "#1c1b1b",
                        "surface-container": "#f1edec",
                        "outline-variant": "#c4c7c7",
                        "outline": "#747878"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "section-gap-lg": "120px",
                        "base": "8px",
                        "container-max": "1440px",
                        "section-gap-sm": "64px",
                        "margin-desktop": "64px",
                        "margin-mobile": "16px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "body-lg": ["Plus Jakarta Sans"],
                        "label-caps": ["Plus Jakarta Sans"],
                        "headline-sm": ["Playfair Display"],
                        "display-lg": ["Playfair Display"],
                        "button": ["Plus Jakarta Sans"],
                        "display-lg-mobile": ["Playfair Display"],
                        "headline-md": ["Playfair Display"],
                        "body-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.1em", "fontWeight": "600"}],
                        "headline-sm": ["24px", {"lineHeight": "1.4", "fontWeight": "400"}],
                        "display-lg": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "400"}],
                        "button": ["14px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "display-lg-mobile": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "400"}],
                        "headline-md": ["32px", {"lineHeight": "1.3", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}]

                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg">
<!-- Main Content Area: Centered Authentication Card -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop py-section-gap-lg">
<div class="w-full max-w-md bg-surface-container-lowest rounded-lg p-margin-mobile md:p-gutter shadow-[0_10px_30px_rgba(0,0,0,0.04)] border border-outline-variant/30 flex flex-col gap-gutter">
<!-- Brand & Header -->
<div class="text-center flex flex-col gap-base mb-4">
<h1 class="font-display-lg-mobile text-display-lg-mobile tracking-tighter text-primary">LUXE</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to your account</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-gutter">
<div class="flex flex-col gap-base">
<label class="font-label-caps text-label-caps text-on-surface" for="email">Email Address</label>
<input class="w-full border-b border-outline-variant bg-transparent px-0 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-0 focus:outline-none transition-colors placeholder:text-on-surface-variant/50" id="email" name="email" placeholder="Enter your email" required="" type="email"/>
</div>
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface" for="password">Password</label>
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<input class="w-full border-b border-outline-variant bg-transparent px-0 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-0 focus:outline-none transition-colors placeholder:text-on-surface-variant/50" id="password" name="password" placeholder="Enter your password" required="" type="password"/>
</div>
<button class="w-full bg-primary text-on-primary font-button text-button py-4 px-8 rounded flex items-center justify-center hover:-translate-y-1 hover:shadow-[0_10px_30px_rgba(0,0,0,0.08)] transition-all duration-300 mt-2" type="submit">
                    LOGIN
                </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="flex-grow h-px bg-outline-variant/50"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant">OR</span>
<div class="flex-grow h-px bg-outline-variant/50"></div>
</div>
<!-- Social Logins -->
<div class="flex flex-col gap-4">
<button class="w-full bg-transparent border border-primary text-primary font-button text-button py-4 px-8 rounded flex items-center justify-center gap-3 hover:-translate-y-1 hover:shadow-[0_10px_30px_rgba(0,0,0,0.04)] transition-all duration-300" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">login</span>
                    Continue with Google
                </button>
<button class="w-full bg-transparent border border-primary text-primary font-button text-button py-4 px-8 rounded flex items-center justify-center gap-3 hover:-translate-y-1 hover:shadow-[0_10px_30px_rgba(0,0,0,0.04)] transition-all duration-300" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">public</span>
                    Continue with Facebook
                </button>
</div>
<!-- Sign Up Link -->
<div class="text-center mt-4">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-medium hover:underline decoration-1 underline-offset-4 transition-all" href="#">Sign up</a>
</p>
</div>
</div>
</main>
</body></html>
